name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'twa-project/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          # Download Android command-line tools
          cd /usr/local/lib
          sudo mkdir -p android-sdk/cmdline-tools
          sudo chown -R $USER:$USER android-sdk
          cd android-sdk/cmdline-tools
          curl -sSLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest

          # Set environment variables
          echo "ANDROID_HOME=/usr/local/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android-sdk" >> $GITHUB_ENV

          # Install required SDK packages
          yes | /usr/local/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools" 2>/dev/null

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias snaptext \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Snaptext" 2>&1

      - name: Build APK
        working-directory: twa-project
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
        env:
          STORE_PASS: android123
          KEY_PASS: android123
          KEY_ALIAS: snaptext

      - name: Collect APK
        if: always()
        run: |
          echo "=== Looking for APK ==="
          find . -name "*.apk" -ls 2>/dev/null
          find . -name "*.aab" -ls 2>/dev/null
          mkdir -p output
          find . -name "*.apk" -exec cp {} output/ \; 2>/dev/null
          ls -la output/ 2>/dev/null || echo "No APK files"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snaptext-ocr-apk
          path: output/
          retention-days: 90
