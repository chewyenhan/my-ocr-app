<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>1789：法兰西生存指南 - 沉浸剧情版</title>
    <style>
        /* ================= 极致大屏优化 ================= */
        body {
            background: #2b2b2b;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-weight: 900;
        }

        .panel {
            background: #f4ecd8;
            border: 15px double #8b0000;
            width: 95vw; max-width: 1300px;
            height: 92vh; padding: 40px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            display: none; flex-direction: column;
            box-sizing: border-box; border-radius: 10px;
            position: relative;
        }

        .panel.active { display: flex; }

        h1 { font-size: 3.8em; color: #5c1616; text-align: center; margin: 5px 0; text-shadow: 3px 3px 0px #fff; }
        
        #story-text {
            font-size: 2.1em; line-height: 1.4;
            margin: 10px 0; background: rgba(255, 255, 255, 0.4);
            padding: 20px; border-radius: 10px;
            border-left: 20px solid #8b0000;
            overflow-y: auto; color: #1a1a1a;
            /* 关键修改：通过 flex 自动分配剩余空间 */
            flex: 1;
            min-height: 150px;
        }

        .choice-btn, .sys-btn {
            background: #8b0000; color: #fff;
            font-size: 1.8em; font-weight: 900;
            padding: 25px; border: 5px solid #000;
            cursor: pointer; border-radius: 15px;
            margin: 10px 0; width: 100%;
            box-shadow: 0 8px 0 #333;
        }
        .choice-btn:hover { background: #ff0000; transform: scale(1.01); }
        .choice-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #333; }

        #status-bar {
            background: #5c1616; color: gold;
            padding: 15px 30px; display: flex;
            justify-content: space-between; font-size: 1.8em;
            border-radius: 10px; margin-bottom: 10px;
        }

        /* 关键修改：调整对话区域高度，避免遮挡 */
        #ai-area {
            display: none; flex-direction: column;
            background: #fff; border: 6px solid #8b0000;
            padding: 15px; border-radius: 15px; 
            height: 380px; /* 适度减小高度 */
            margin-top: 10px; 
            position: relative;
        }
        #chat-box {
            flex-grow: 1; overflow-y: auto;
            font-size: 1.6em; padding: 10px; background: #fdfdfd;
            border-bottom: 3px solid #eee;
        }
        .msg { margin: 10px 0; padding: 15px; border-radius: 8px; border: 2px solid transparent; }
        .king-msg { background: #ffdada; color: #8b0000; border-color: #8b0000; }
        .player-msg { background: #dadaff; color: #00008b; text-align: right; border-color: #00008b; }

        .group-input { font-size: 2em; width: 80%; padding: 15px; text-align: center; border: 5px solid #8b0000; }
        
        #vol-ctrl { 
            position: fixed; top: 10px; left: 10px; 
            background: rgba(255,255,255,0.9); padding: 15px; 
            border: 3px solid #000; z-index: 1000;
            border-radius: 10px; box-shadow: 5px 5px 0 #8b0000;
        }
        .vol-item { margin-bottom: 10px; font-size: 1.2em; font-weight: bold; }
        
        .highlight { color: #d00; font-size: 1.1em; }

        .back-hall-btn {
            position: absolute; top: -50px; right: 10px;
            background: #444; color: #fff; padding: 5px 15px;
            border-radius: 10px; font-size: 1.2em; cursor: pointer;
            border: 2px solid #000;
        }
        
        /* 选项区域的最大高度限制，防止超出屏幕 */
        #choice-area {
            max-height: 40%;
            overflow-y: auto;
        }

        /* 提示信息框 */
        #custom-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 15px 30px;
            border-radius: 8px; z-index: 9999; font-size: 1.5em; border: 2px solid gold;
            display: none; text-align: center;
        }
    </style>
</head>
<body>

<div id="custom-toast"></div>

<div id="vol-ctrl">
    <div class="vol-item">📣 语音: <input type="range" id="vol-speech" min="0" max="1" step="0.1" value="0.8"></div>
    <div class="vol-item">🥁 鼓点: <input type="range" id="vol-drum" min="0" max="1" step="0.1" value="0.2"></div>
</div>

<div id="p-start" class="panel active" style="text-align: center; justify-content: center; background: #8b0000; border: none;">
    <h1 style="color: white; font-size: 5em;">1789：巴黎生存指南</h1>
    <h2 style="color: gold; font-size: 2.5em;">— 沉浸剧情·多分支版 —</h2>
    
    <!-- API 设置区域 -->
    <div id="api-setup" style="margin: 20px auto; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; width: 80%; border: 2px solid gold;">
        <p style="color: gold; font-size: 1.5em; margin: 0 0 10px 0;">🔌 外接 API 设置 (沉浸式沟通体验必需)</p>
        <input type="password" id="api-key-input" class="group-input" style="font-size: 1.2em; width: 70%; padding: 10px; margin-bottom: 10px;" placeholder="在此输入 Gemini API Key">
        <br>
        <button class="sys-btn" style="font-size: 1.2em; padding: 10px 20px; width: auto; background: #444; border-color: gold;" onclick="detectModels()">🔍 检测并加载模型</button>
        <br>
        <select id="model-select" class="group-input" style="font-size: 1.2em; width: 70%; padding: 10px; margin-top: 10px; display: none; background: #fff; color: #000;"></select>
    </div>

    <button class="sys-btn" style="background: gold; color: #8b0000; font-size: 3em; height: 150px; margin-top: 20px;" onclick="initAll()">⚔️ 开启历史体验 ⚔️</button>
</div>

<div id="p-setup" class="panel">
    <h2>设定玩家数量</h2>
    <div style="text-align: center; margin-top: 50px;">
        <p style="font-size: 2em;">有多少位玩家准备参与历史轮回：</p>
        <input type="number" id="g-count" value="3" class="group-input"><br><br>
        <button class="sys-btn" onclick="goNaming()">下一步：输入名号</button>
    </div>
</div>

<div id="p-naming" class="panel">
    <h2>玩家名录</h2>
    <div id="name-container" style="flex-grow: 1; overflow-y: auto; padding: 20px;"></div>
    <button class="sys-btn" onclick="saveGroups()">进入大厅</button>
</div>

<div id="p-menu" class="panel">
    <h2>📜 巴黎大地图：历史的选择</h2>
    <div id="group-list" style="flex-grow: 1; overflow-y: auto;"></div>
    <p id="victory" style="display:none; text-align:center; color:red; font-size:2em;">🔥 全民觉醒！旧制度彻底崩塌！ 🔥</p>
</div>

<div id="p-game" class="panel">
    <div id="status-bar">
        <span id="show-gname">玩家</span>
        <span id="show-stat">状态：阶级压迫中</span>
    </div>
    <div id="story-text"></div>
    <div id="choice-area"></div>
    
    <div id="ai-area">
        <div class="back-hall-btn" onclick="runScene('MENU')">🚪 返回大厅</div>
        <div id="chat-box"></div>
        <div style="display: flex; margin-top: 10px;">
            <input type="text" id="ai-input" class="group-input" style="flex-grow: 1; margin: 0; font-size: 1.5em;" placeholder="质问国王..." onkeypress="handleEnter(event)">
            <button id="ai-send-btn" onclick="chatWithKing()" style="width: 150px; font-size: 1.8em; background: #000; color: #fff; cursor: pointer;">质问</button>
        </div>
        <button id="final-revolt" class="sys-btn" style="display:none; background: black; border-color: red; margin-top: 10px; padding: 15px;" onclick="runScene('REVOLT')">🔥 无法沟通，发动武装起义！</button>
    </div>
</div>

<script>
    const apiKey = ""; // 符合系统级全局变量要求的占位符
    let customApiKey = ""; // 用于存放玩家填入的真实 API KEY
    let selectedModel = "";

    // ========= 新增：自定义消息提示 ============
    function showToast(msg) {
        const toast = document.getElementById('custom-toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // ========= 新增：API指数退避重试 ============
    async function fetchWithRetry(url, options, maxRetries = 5) {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                return await response.json();
            } catch (error) {
                if (i === maxRetries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delays[i]));
            }
        }
    }

    // ========= 新增：检测并加载模型 ============
    async function detectModels() {
        const keyInput = document.getElementById('api-key-input').value.trim();
        if(!keyInput) {
            showToast("⚠️ 请先输入 API Key！");
            return;
        }
        customApiKey = keyInput;
        showToast("⏳ 正在请求 Gemini 模型列表...");
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${customApiKey}`);
            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            
            const select = document.getElementById('model-select');
            select.innerHTML = '';
            
            // 筛选文本生成模型
            data.models.forEach(m => {
                if(m.name.includes('gemini') && m.supportedGenerationMethods.includes('generateContent')) {
                    const opt = document.createElement('option');
                    opt.value = m.name.replace('models/', '');
                    opt.text = m.displayName || m.name;
                    select.appendChild(opt);
                }
            });
            select.style.display = 'inline-block';
            showToast("✅ 模型检测成功！请在下方选择模型。");
        } catch (err) {
            showToast("❌ 检测失败: " + err.message);
        }
    }

    // ================= 原有音效与游戏引擎 =================
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function createNoiseBuffer() {
        const bufferSize = ctx.sampleRate * 2;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        return buffer;
    }
    const noiseBuffer = createNoiseBuffer();

    function playDrum(isHeavy = false) {
        const vol = document.getElementById('vol-drum').value;
        if(vol <= 0) return;
        const source = ctx.createBufferSource();
        source.buffer = noiseBuffer;
        const filter = ctx.createBiquadFilter();
        filter.type = "bandpass";
        filter.frequency.value = isHeavy ? 150 : 600;
        filter.Q.value = 1;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(isHeavy ? vol * 0.8 : vol * 0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (isHeavy ? 0.3 : 0.1));
        source.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        source.start();
    }

    let bgmTimer = null;
    function startRevolutionBGM() {
        if(bgmTimer) return;
        let step = 0;
        bgmTimer = setInterval(() => {
            if(step % 4 === 0) playDrum(true);
            else if(step % 4 === 3) { playDrum(false); setTimeout(() => playDrum(false), 100); }
            else playDrum(false);
            step++;
        }, 550);
    }

    function playSfx(f, t, d) {
        const v = document.getElementById('vol-drum').value;
        if(v <= 0) return;
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type = t; o.frequency.value = f;
        g.gain.setValueAtTime(v * 0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + d);
    }

    function speak(txt) {
        const v = document.getElementById('vol-speech').value;
        if(v <= 0) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt.replace(/<[^>]*>?/gm, '').replace(/【[^】]*】/g, ''));
        u.lang = 'zh-CN'; u.volume = v; u.rate = 1.0;
        window.speechSynthesis.speak(u);
    }

    const script = {
        "START": {
            text: "<b>【第一章：阶级压迫】</b><br>1789年，你是巴黎街头的一名贫苦鞋匠。这一年由于连续的自然灾害导致小麦绝收，面包价格翻了三倍。此时，国王的税吏又来收‘盐税’了。你的积蓄只够买最后一块面包，你会怎么办？",
            btns: [
                { t: "A. 拦截税吏，抢回血汗钱（激进路线）", next: "PATH_A" },
                { t: "B. 跪求税吏缓期执行（温和路线）", next: "PATH_B" },
                { t: "C. 锁上家门，谁也不理，祈祷动乱结束（中立路线）", next: "PATH_C" }
            ]
        },
        "PATH_A": {
            text: "<b>【第二章：社会冲突】</b><br>你抢回了钱，但也成了通缉犯。你在逃亡中发现，整个巴黎都在传阅小册子：国王为了填补美国独立战争留下的巨额亏空，准备绕开法律向第三等级收更多的税。这时候，大家都往网球场跑，说是要宣誓。",
            btns: [
                { t: "A. 去网球场！我们要制定自己的宪法！", next: "CONVENT_1" },
                { t: "B. 躲进咖啡馆，听听知识分子怎么说", next: "CONVENT_2" }
            ]
        },
        "PATH_B": {
            text: "<b>【第二章：思想觉醒】</b><br>税吏踢翻了你的摊位，嘲笑你的懦弱。正当你绝望时，一位年轻人塞给你一本卢梭的《社会契约论》。他告诉你：‘主权在民，我们不是国王的私产。’ 你意识到，求饶是没用的。",
            btns: [
                { t: "A. 把这些思想告诉更多的穷苦人", next: "CONVENT_2" },
                { t: "B. 听说凡尔赛在开三级会议，去那里抗议", next: "CONVENT_3" }
            ]
        },
        "PATH_C": {
            text: "<b>【第二章：无法逃避】</b><br>你躲在家中，但通货膨胀让你的最后一点积蓄成了废纸。你饥寒交迫，听到邻居家的孩子因为没面包吃而哭泣。此时，愤怒的妇人们正拿着叉子和菜刀，准备一路步行前往凡尔赛质问国王。",
            btns: [
                { t: "A. 饿死也是死，加入进军凡尔赛的队伍！", next: "CONVENT_3" },
                { t: "B. 离开家，去寻找那个所谓的‘国民议会’寻求救济", next: "CONVENT_1" }
            ]
        },
        "CONVENT_1": {
            text: "<b>【关键抉择：国民议会】</b><br>在网球场，成千上万的人宣誓：‘不制定出宪法，决不解散！’ 你们被推举为平民代表，去面对那个自诩‘太阳王’后裔的人。",
            btns: [{ t: "走进那扇通往凡尔赛的黄金大门", next: "AI_KING" }]
        },
        "CONVENT_2": {
            text: "<b>【理性光辉：咖啡馆密谋】</b><br>在普罗科普咖啡馆，你明白了‘天赋人权’。现在的你不再是乞丐，而是公民。你决定用理性的声音去质问这个国家的统治者。",
            btns: [{ t: "作为公民代表，去会见国王", next: "AI_KING" }]
        },
        "CONVENT_3": {
            text: "<b>【饥饿咆哮：进军凡尔赛】</b><br>你混在数万名饥饿的民众中，在雨中走了十几个小时来到凡尔赛宫。你们不仅要面包，还要一个交代。卫兵不敢开枪，你们冲进了宫廷。",
            btns: [{ t: "直接面对瑟瑟发抖的路易十六", next: "AI_KING" }]
        },
        "REVOLT": {
            text: "<b>【历史结局：火烧巴士底】</b><br>谈判宣告破裂。你意识到旧制度绝不会自我救赎。1789年7月14日，你随着人潮冲向了巴士底狱……<br><br><span class='highlight'>教师寄语：从温和到激进，从退缩到反抗，这是每一个法兰西平民的觉醒之路，也是历史不可逆转的洪流。</span>",
            btns: [{ t: "🏁 体验结束，返回目录", next: "MENU" }]
        }
    };

    let gData = []; let cIdx = 0; let aiCnt = 0;

    function initAll() { 
        if(!customApiKey) {
            showToast("提示：未输入 API Key，将使用模拟测试数据或可能请求失败。");
        }
        ctx.resume(); startRevolutionBGM(); showP('p-setup'); 
    }
    
    function showP(id) { document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function goNaming() {
        const count = document.getElementById('g-count').value;
        const container = document.getElementById('name-container');
        container.innerHTML = '';
        for(let i=1; i<=count; i++) {
            container.innerHTML += `<div style='margin-bottom:15px;'>玩家 ${i}: <input type='text' id='gn-${i}' class='group-input' style='width:60%;' placeholder='输入名号'></div>`;
        }
        showP('p-naming');
    }

    function saveGroups() {
        const ins = document.querySelectorAll('#name-container input');
        gData = [];
        ins.forEach(it => gData.push({ name: it.value || `玩家 ${gData.length+1}`, done: false }));
        renderMenu(); showP('p-menu');
    }

    function renderMenu() {
        const list = document.getElementById('group-list');
        list.innerHTML = ''; let all = true;
        gData.forEach((g, i) => {
            const b = document.createElement('button');
            b.className = 'sys-btn';
            if(g.done) { b.innerHTML = `✅ ${g.name} (已投身革命)`; b.style.background = '#666'; b.disabled = true; }
            else { all = false; b.innerHTML = `⚔️ 进入历史：【${g.name}】`; b.onclick = () => startGroup(i); }
            list.appendChild(b);
        });
        if(all) document.getElementById('victory').style.display = 'block';
    }

    function startGroup(i) {
        cIdx = i; aiCnt = 0;
        document.getElementById('show-gname').innerText = `当前玩家：${gData[i].name}`;
        document.getElementById('ai-area').style.display = 'none';
        document.getElementById('choice-area').style.display = 'block';
        document.getElementById('chat-box').innerHTML = '';
        document.getElementById('final-revolt').style.display = 'none';
        
        // 重置聊天区UI
        document.getElementById('ai-input').disabled = false;
        document.getElementById('ai-input').placeholder = "质问国王...";
        document.getElementById('ai-send-btn').disabled = false;
        
        runScene("START"); showP('p-game');
    }

    function runScene(sid) {
        playSfx(500, 'square', 0.1);
        if(sid === "MENU") { gData[cIdx].done = true; renderMenu(); showP('p-menu'); return; }
        
        const area = document.getElementById('choice-area');
        const txt = document.getElementById('story-text');
        
        if(sid === "AI_KING") {
            const intro = "路易十六端坐在王座上，显得极不耐烦：‘朕已经允许你们召开会议了，你们竟然还想要什么宪法？难道朕的旨意还不够神圣吗？’";
            txt.innerHTML = "<b>【最终审判：凡尔赛宫】</b><br>" + intro;
            area.style.display = 'none';
            document.getElementById('ai-area').style.display = 'flex';
            speak(intro);
            setTimeout(() => kingSay("又是你？朕不管你是哪条路来的，现在滚回你的鞋匠铺去！"), 4000);
            return;
        }

        const s = script[sid];
        txt.innerHTML = s.text;
        area.innerHTML = '';
        speak(s.text);

        s.btns.forEach(b => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = b.t;
            btn.onclick = () => runScene(b.next);
            area.appendChild(btn);
        });
    }

    function handleEnter(e) { if(e.key === 'Enter') chatWithKing(); }

    // ========= 核心修改：对接 Gemini API 与 3次强制失败机制 ============
    async function chatWithKing() {
        const inp = document.getElementById('ai-input');
        const val = inp.value.trim(); if(!val) return;
        
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg player-msg">你：${val}</div>`;
        inp.value = ''; 
        aiCnt++; // 记录交互次数
        
        box.scrollTop = 9999;
        
        if (aiCnt > 3) return; 

        // 锁定输入框，防止连续发送
        inp.disabled = true;
        document.getElementById('ai-send-btn').disabled = true;

        const loadingId = 'loading-' + Date.now();
        box.innerHTML += `<div id="${loadingId}" class="msg king-msg">👑 路易十六：(正在高傲地思索如何训斥你...)</div>`;
        box.scrollTop = 9999;
        
        const actModel = document.getElementById('model-select').value || "gemini-2.5-flash-preview-09-2025";
        const prompt = `你扮演1789年法国大革命前夕的路易十六。玩家是前来质问你的平民代表。你高傲、不耐烦、认为权力神授（君权神授），对平民带有蔑视。请根据玩家的话进行反驳，字数严格限制在50字以内。玩家说：${val}`;
        
        let replyText = "朕不想听这些废话！"; // 默认兜底文案
        
        if(customApiKey) {
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${actModel}:generateContent?key=${customApiKey}`;
                const options = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                        // 已移除 maxOutputTokens 限制，避免因 Token 计算方式导致中文内容被强制截断
                    })
                };
                
                const data = await fetchWithRetry(url, options);
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    replyText = data.candidates[0].content.parts[0].text;
                }
            } catch(e) {
                console.error("API请求失败:", e);
                replyText = "（沉默）朕的卫兵呢？把这些暴民赶出去！(API通讯故障)";
            }
        }

        document.getElementById(loadingId).remove();
        
        // 【强制失败逻辑】：到达第3次必然触发导火索
        if (aiCnt === 3) {
            replyText += " 够了！朕受够了你们的无理取闹！卫兵，全部拿下！(谈判彻底破裂)";
        }
        
        kingSay(replyText);

        // 第3次后锁定界面，展现大革命按钮
        if (aiCnt >= 3) {
            document.getElementById('ai-input').disabled = true;
            document.getElementById('ai-input').placeholder = "谈判已经破裂，历史的车轮开始转动...";
            document.getElementById('ai-send-btn').disabled = true;
            document.getElementById('final-revolt').style.display = 'block';
        } else {
            // 解锁输入
            inp.disabled = false;
            document.getElementById('ai-send-btn').disabled = false;
            inp.focus();
        }
    }

    function kingSay(t) {
        playSfx(200, 'sawtooth', 0.3);
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg king-msg">👑 路易十六：${t}</div>`;
        box.scrollTop = 9999;
        speak(t);
    }
</script>
</body>
</html>
