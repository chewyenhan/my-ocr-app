name: Build Capacitor AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Copy keystore
        run: |
          cp github-pages-app/snaptext-signing.keystore capacitor-android/release.keystore

      - name: Build AAB
        working-directory: capacitor-android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          STORE_PASS: android123
          KEY_PASS: android123
          KEY_ALIAS: snaptext

      - name: Collect AAB
        run: |
          mkdir -p output
          find capacitor-android -name "*.aab" -exec cp {} output/ \; 2>/dev/null
          ls -la output/

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: snaptext-release-aab
          path: output/
          retention-days: 90
