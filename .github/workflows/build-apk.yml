name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'twa-project/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias snaptext \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Snaptext, OU=Dev, O=ChewYenHan, L=Taiping, ST=Perak, C=MY"

      - name: Build APK with Gradle
        working-directory: twa-project
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=snaptext \
            -Pandroid.injected.signing.key.password=android123

      - name: Collect APK
        run: |
          mkdir -p output
          find twa-project -name "*.apk" -exec cp {} output/ \; 2>/dev/null
          echo "=== APK files ==="
          ls -la output/ || echo "No APK found"
          find twa-project -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snaptext-ocr-apk
          path: output/
          retention-days: 90
