name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'twa-project/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container:
      image: androidsdk/android-35:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias snaptext \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Snaptext, OU=Dev, O=ChewYenHan, L=Taiping, ST=Perak, C=MY"

      - name: Build APK
        working-directory: twa-project
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          STORE_PASS: android123
          KEY_PASS: android123
          KEY_ALIAS: snaptext

      - name: Collect APK
        run: |
          mkdir -p output
          find twa-project -name "*.apk" -exec cp {} output/ \; 2>/dev/null
          echo "=== APK files ==="
          ls -la output/ || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snaptext-ocr-apk
          path: output/
          retention-days: 90
