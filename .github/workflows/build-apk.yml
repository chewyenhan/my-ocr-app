name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'
      - 'assets/icon-*.png'
      - 'sw.js'
      - 'index.html'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias snaptext \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Snaptext, OU=Dev, O=ChewYenHan, L=Taiping, ST=Perak, C=MY"

      - name: Initialize bubblewrap project
        run: |
          mkdir -p twa-project
          cat > twa-project/twa-manifest.json << 'EOF'
          {
            "packageId": "com.chewyenhan.snaptextocr",
            "host": "chewyenhan.github.io",
            "name": "Snaptext OCR",
            "shortName": "Snaptext OCR",
            "themeColor": "#0f172a",
            "backgroundColor": "#0f172a",
            "startUrl": "/my-ocr-app/",
            "display": "standalone",
            "orientation": "portrait",
            "iconUrl": "https://chewyenhan.github.io/my-ocr-app/assets/icon-512.png",
            "maskableIconUrl": "https://chewyenhan.github.io/my-ocr-app/assets/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "enableNotifications": false,
            "signingKey": {
              "path": "../release.keystore",
              "alias": "snaptext"
            }
          }
          EOF

      - name: Build APK
        working-directory: twa-project
        run: |
          bubblewrap build
        env:
          STORE_PASS: android
          KEY_PASS: android
          KEY_ALIAS: snaptext

      - name: Find and collect APK
        run: |
          mkdir -p output
          find . -path "*/build/outputs/apk/*.apk" -exec cp {} output/ \; 2>/dev/null || true
          find . -path "*/build/outputs/bundle/*.aab" -exec cp {} output/ \; 2>/dev/null || true
          echo "Output files:"
          ls -la output/ || echo "No output files"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: snaptext-ocr-apk
          path: output/
          retention-days: 90
