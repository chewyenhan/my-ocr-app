<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式历史游戏</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .carousel-container {
            position: relative;
            padding: 20px 0;
        }
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 40px;
            text-align: center;
            z-index: 10;
        }
        .arrow.left { left: 10px; }
        .arrow.right { right: 10px; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <h1 style="text-align:center; margin:20px 0; color:var(--primary);">沉浸式历史游戏</h1>
        <div class="carousel-container">
            <button class="arrow left" id="prevBtn">&#9664;</button>
            <div class="carousel" id="gameCarousel">
                <div class="card">
                    <img src="assets/images/enlightenment_game_cover.png" alt="启蒙运动闯关游戏" />
                    <h3>启蒙运动闯关游戏‑文明重启</h3>
                    <a href="games/启蒙运动闯关游戏-文明重启.html">开始游戏</a>
                </div>
                <!-- Add more cards for other existing games here -->
            </div>
            <button class="arrow right" id="nextBtn">&#9654;</button>
        </div>
    </div>
    <script>
        const carousel = document.getElementById('gameCarousel');
        const cardWidth = carousel.querySelector('.card').offsetWidth + 20; // card width + gap
        document.getElementById('prevBtn').addEventListener('click', () => {
            carousel.scrollBy({ left: -cardWidth, behavior: 'smooth' });
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            carousel.scrollBy({ left: cardWidth, behavior: 'smooth' });
        });
    </script>
</body>
</html>
