name: Build Capacitor APK (Test)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup keystore
        run: |
          cd android
          cp ../keystore/snaptext-signing.keystore release.keystore

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASS || 'android123' }}
          KEY_PASS: ${{ secrets.KEY_PASS || 'android123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'snaptext' }}

      - name: Collect APK
        run: |
          mkdir -p output
          find android -name "*.apk" -exec cp {} output/ \; 2>/dev/null
          ls -la output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snaptext-test-apk
          path: output/
          retention-days: 7
