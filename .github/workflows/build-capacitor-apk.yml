name: Build Capacitor APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias snaptext \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Snaptext" 2>/dev/null

      - name: Build APK
        working-directory: capacitor-android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          STORE_PASS: android123
          KEY_PASS: android123
          KEY_ALIAS: snaptext

      - name: Collect APK
        run: |
          mkdir -p output
          find capacitor-android -name "*.apk" -exec cp {} output/ \; 2>/dev/null
          ls -la output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snaptext-capacitor-apk
          path: output/
          retention-days: 90
