<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古埃及AI医神大挑战 - 网页版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #1a1410; color: #f4e4bc; }
        .egypt-title { font-family: 'Noto Serif SC', serif; }
        .egypt-card { 
            background: rgba(45, 36, 30, 0.95); 
            border: 3px solid #c19a6b; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(193, 154, 107, 0.3);
        }
        .chat-container { 
            height: 400px; 
            overflow-y: auto; 
            background: #231d19; 
            border-radius: 12px; 
            padding: 20px;
            border: 1px inset #5d4a37;
        }
        .message { margin-bottom: 15px; padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.6; }
        .ai-msg { background: #3d3129; color: #f4e4bc; align-self: flex-start; border-left: 4px solid #c19a6b; }
        .user-msg { background: #c19a6b; color: #1a1410; align-self: flex-end; margin-left: auto; font-weight: 700; }
        .btn-egypt { background-color: #c19a6b; color: #1a1410; transition: all 0.3s; }
        .btn-egypt:hover:not(:disabled) { background-color: #e4c49a; transform: translateY(-2px); }
        .btn-egypt:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 设置面板 */
        .settings-panel {
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid #c19a6b;
        }

        .audio-wave {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            height: 20px;
        }
        .audio-bar { width: 3px; background: #c19a6b; animation: wave 1s infinite ease-in-out; }
        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 18px; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 顶部设置栏 -->
    <div class="settings-panel p-3 flex justify-center items-center gap-4 text-sm">
        <label for="api-key-input" class="text-amber-500 font-bold">🔑 设置 API Key:</label>
        <input type="password" id="api-key-input" 
            class="bg-zinc-800 border border-amber-900 rounded px-3 py-1 text-amber-100 focus:outline-none focus:border-amber-500 w-64"
            placeholder="输入您的 Gemini API Key">
        <button onclick="saveApiKey()" class="bg-amber-700 hover:bg-amber-600 text-white px-4 py-1 rounded transition">保存</button>
        <span id="save-status" class="text-green-500 hidden">✅ 已保存</span>
    </div>

    <div class="flex-1 flex items-center justify-center p-4 md:p-8">
        <div class="max-w-4xl w-full egypt-card p-6 md:p-10">
            <div class="text-center mb-8">
                <h1 class="egypt-title text-4xl md:text-5xl text-amber-500 mb-4">🩺 AI 医神大挑战</h1>
                <p class="text-amber-200/70 italic text-lg">“在此，神术与医术并存，咒语与药方齐飞。”</p>
            </div>

            <div id="section-doctor" class="space-y-6">
                <div class="bg-amber-900/30 p-4 rounded-lg border border-amber-800 text-center">
                    <p class="text-amber-100">请向底比斯的首席祭司描述你的症状，他将为你开方，并亲自向你传达神谕！</p>
                </div>
                
                <div id="chat-box" class="chat-container flex flex-col">
                    <div class="message ai-msg">愿太阳神拉的光芒照耀你，陌生的灵魂。我是这里的医师。告诉我，你身体的哪个部分失去了平衡？</div>
                </div>
                
                <div id="loading-status" class="hidden flex items-center justify-center gap-3 text-amber-500 italic">
                    <div class="audio-wave">
                        <div class="audio-bar" style="animation-delay: 0.1s"></div>
                        <div class="audio-bar" style="animation-delay: 0.2s"></div>
                        <div class="audio-bar" style="animation-delay: 0.3s"></div>
                    </div>
                    <span>大祭司正在翻阅纸草书并吟唱咒语...</span>
                </div>

                <div class="flex gap-3">
                    <input type="text" id="user-input" 
                        class="flex-1 p-4 bg-zinc-900 border-2 border-amber-800 rounded-xl focus:outline-none focus:border-amber-500 text-amber-100" 
                        placeholder="描述你的症状（例如：我被骆驼踢到了肚子...）">
                    <button onclick="askDoctor()" id="send-btn" class="btn-egypt px-8 py-4 rounded-xl font-black text-lg">咨询神医</button>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-amber-900/50 flex justify-between items-center text-xs text-amber-700">
                <span>© 公元前1300年 底比斯皇家医学院</span>
                <div class="flex items-center gap-2">
                    <span id="status-dot" class="w-2 h-2 bg-red-500 rounded-full"></span>
                    <span id="status-text">请先配置 API Key</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化：从 LocalStorage 读取 Key
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('api-key-input').value = savedKey;
                updateStatus(true);
            }
        });

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                const status = document.getElementById('save-status');
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 2000);
                updateStatus(true);
            }
        }

        function updateStatus(isOk) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if (isOk) {
                dot.classList.replace('bg-red-500', 'bg-green-500');
                dot.classList.add('animate-pulse');
                text.innerText = '神庙网络已连接';
            }
        }

        function getApiKey() {
            return localStorage.getItem('gemini_api_key') || "";
        }

        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length, true);
            for (let i = 0; i < pcmData.length; i++) view.setUint8(44 + i, pcmData[i]);
            return new Blob([view], { type: 'audio/wav' });
        }

        async function speakText(text) {
            const key = getApiKey();
            if (!key) return;

            try {
                const voicePrompt = `Say in a wise, ancient, and slightly mystical tone: ${text}`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: voicePrompt }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: {
                                    prebuiltVoiceConfig: {
                                        voiceName: "Charon" 
                                    }
                                }
                            }
                        }
                    })
                });

                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const binaryString = atob(audioData);
                const pcmBytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) pcmBytes[i] = binaryString.charCodeAt(i);

                const wavBlob = pcmToWav(pcmBytes, 24000);
                const audioUrl = URL.createObjectURL(wavBlob);
                const audio = new Audio(audioUrl);
                await audio.play();
            } catch (error) {
                console.error("语音合成失败", error);
            }
        }

        async function askDoctor() {
            const key = getApiKey();
            if (!key) {
                alert("请先在顶部输入并保存您的 API Key！");
                return;
            }

            const inputEl = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const btn = document.getElementById('send-btn');
            const loading = document.getElementById('loading-status');
            
            if (!inputEl.value.trim()) return;

            const userText = inputEl.value;
            chatBox.innerHTML += `<div class="message user-msg">${userText}</div>`;
            inputEl.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            
            loading.classList.remove('hidden');
            btn.disabled = true;

            const systemPrompt = "你是一位公元前1300年的古埃及神医大祭司。你医术高明且充满神秘感。请给出基于史实的古埃及疗法（如蜂蜜抗菌、霉面包、咒语、外科缝合）。回答要短小精悍，适合人声朗读。";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                
                if (!response.ok) throw new Error();
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                if (aiText) {
                    chatBox.innerHTML += `<div class="message ai-msg">${aiText}</div>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    await speakText(aiText);
                }
            } catch (err) {
                chatBox.innerHTML += `<div class="message ai-msg">API调用失败。请检查您的 Key 是否正确或网络是否通畅。</div>`;
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askDoctor();
        });
    </script>
</body>
</html>
