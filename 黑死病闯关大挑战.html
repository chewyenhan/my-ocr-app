<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>黑死病生存大挑战：三关淘汰赛</title>
    <style>
        :root { --bg: #0f0f0f; --accent: #ff4757; --success: #2ed573; --text: #dcdde1; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .game-card { width: 90%; max-width: 800px; background: #1e272e; border: 2px solid #485460; border-radius: 20px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); position: relative; }
        h1 { text-align: center; color: var(--accent); font-size: 2.5em; text-transform: uppercase; letter-spacing: 5px; margin-top: 0; }
        .level-indicator { text-align: center; font-size: 1.2em; color: #ffa502; margin-bottom: 20px; border: 1px solid #ffa502; display: inline-block; padding: 5px 20px; border-radius: 50px; }
        #story-box { font-size: 1.4em; line-height: 1.6; margin-bottom: 30px; min-height: 120px; border-left: 4px solid var(--accent); padding-left: 20px; }
        .choices { display: grid; gap: 15px; }
        button { background: #2f3542; color: white; border: 1px solid #57606f; padding: 18px; font-size: 1.1em; border-radius: 10px; cursor: pointer; transition: 0.3s; text-align: left; }
        button:hover { background: #57606f; transform: translateX(10px); border-color: white; }
        #feedback { display: none; text-align: center; }
        .fact-box { background: #000; padding: 20px; border-radius: 10px; margin-top: 20px; font-style: italic; color: #a4b0be; font-size: 0.95em; }
        .dead { color: var(--accent); font-weight: bold; font-size: 1.5em; }
        .alive { color: var(--success); font-weight: bold; font-size: 1.5em; }
        .nav-btn { background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.2em; margin-top: 20px; cursor: pointer; text-align: center; width: auto; }
    </style>
</head>
<body>

<div class="game-card">
    <div style="text-align: center;"><div class="level-indicator" id="level-tag">第一关：危机降临</div></div>
    <h1>☠️ 逃离 1348</h1>
    
    <div id="game-content">
        <div id="story-box">正在连接时空...</div>
        <div class="choices" id="choice-box"></div>
    </div>

    <div id="feedback">
        <div id="status-msg"></div>
        <p id="desc-msg"></p>
        <div class="fact-box">
            📚 <strong>历史真相：</strong> <span id="fact-msg"></span>
        </div>
        <button class="nav-btn" id="next-btn" onclick="nextLevel()">进入下一轮调查</button>
    </div>
</div>

<script>
    const levels = [
        {
            tag: "第一关：危机降临",
            story: "1348年夏天，佛罗伦萨的空气变得凝重。邻居老王身上出现了紫黑色的肿块，在痛苦中死去。作为街道委员会成员，你们决定：",
            choices: [
                { text: "A. 带领所有人去大教堂举行万人大祈祷，求上帝宽恕。", correct: false, msg: "全灭！万人集会让病毒像野火一样蔓延。", fact: "当时人们认为瘟疫是天谴，但大规模集会反而造成了人类历史上最严重的交叉感染。" },
                { text: "B. 立刻封锁街道，并带家人逃往人口稀少的乡下庄园。", correct: true, msg: "活了下来！逃离人口密集区是当时唯一的求生之路。", fact: "《十日谈》记录了当时富人逃往乡下的做法，这虽然自私，但确实在客观上起到了隔离作用。" },
                { text: "C. 留下来，把窗户关死，全家人一起在家里烧香熏蚊子。", correct: false, msg: "失败！家里的老鼠和跳蚤并没有死，它们依然带着病菌。", fact: "黑死病的主要传播媒介是鼠蚤，单纯的烟熏和紧闭窗户无法挡住这种‘隐形杀手’。" }
            ]
        },
        {
            tag: "第二关：致命的“名医”",
            story: "虽然你们逃到了乡下，但一名仆人还是发烧了。村里请来了一位戴着“鸟嘴面具”的医生。他提出了以下治疗建议，你们选哪个？",
            choices: [
                { text: "A. 用烧红的烙铁烫开肿块，然后贴上蛤蟆皮和药膏。", correct: false, msg: "惨不忍睹！这种治疗不仅剧痛，还引发了致命的败血症。", fact: "中世纪医生认为‘毒物’需要被引出来，各种偏方（如贴癞蛤蟆）其实都是在伤口上撒盐。" },
                { text: "B. 配合医生进行大放血，把体内的“坏血”全部排掉。", correct: false, msg: "极度虚弱！放血让人的免疫力降到零，加速了死亡。", fact: "‘放血疗法’统治了欧洲医学上千年，但在鼠疫面前，它只是在帮死神推了一把。" },
                { text: "C. 用醋洗手，将病人彻底隔离在单独的小屋，并每天消毒。", correct: true, msg: "奇迹！虽然简陋，但隔离切断了传播途径，其他人活了下来。", fact: "虽然当时没人知道‘细菌’，但醋的酸性和物理隔离确实是中世纪最先进的防御手段。" }
            ]
        },
        {
            tag: "第三关：社会的巨变",
            story: "瘟疫过后，领地里的农奴死了一大半，庄园里的庄稼没人收割。身为幸存的劳动者，面对贪婪的领主，你们的选择将改变历史：",
            choices: [
                { text: "A. 乖乖听话，继续像以前一样每周为领主白干五天活。", correct: false, msg: "由于你太听话，封建剥削继续。你最终还是在贫困中死去。", fact: "黑死病后的劳动力短缺本是翻身的机会，如果继续妥协，封建制将不会崩溃。" },
                { text: "B. 联合其他幸存者要求加工资，否则就逃往城市当自由民。", correct: true, msg: "成功！领主被迫让步。封建庄园制度开始瓦解！", fact: "黑死病导致人口锐减，‘人’变得值钱了。农奴通过斗争获得了工资和自由，这标志着封建制度的衰落。" },
                { text: "C. 认为这都是宿命，把所有财物捐给教会，余生只吃素排毒。", correct: false, msg: "精神胜利了，但你的生活质量回到了原始社会。", fact: "虽然教会势力在短期内有所增加，但更多人开始怀疑教会的权威，为后来的宗教改革埋下了伏笔。" }
            ]
        }
    ];

    let currentLevel = 0;

    function initLevel() {
        const lv = levels[currentLevel];
        document.getElementById("level-tag").innerText = lv.tag;
        document.getElementById("story-box").innerText = lv.story;
        const cBox = document.getElementById("choice-box");
        cBox.innerHTML = "";
        lv.choices.forEach((c, idx) => {
            const btn = document.createElement("button");
            btn.innerText = c.text;
            btn.onclick = () => handleChoice(c);
            cBox.appendChild(btn);
        });
        document.getElementById("game-content").style.display = "block";
        document.getElementById("feedback").style.display = "none";
    }

    function handleChoice(c) {
        document.getElementById("game-content").style.display = "none";
        document.getElementById("feedback").style.display = "block";
        const msgBox = document.getElementById("status-msg");
        const nextBtn = document.getElementById("next-btn");

        if (c.correct) {
            msgBox.innerHTML = "<span class='alive'>✅ 恭喜！这一轮你们活下来了！</span>";
            nextBtn.style.display = "inline-block";
            nextBtn.innerText = currentLevel === levels.length - 1 ? "查看最终结局" : "进入下一轮调查";
        } else {
            msgBox.innerHTML = "<span class='dead'>💀 淘汰！全班选该项的同学请坐下。</span>";
            nextBtn.style.display = "inline-block";
            nextBtn.innerText = "重置时空（再试一次）";
            nextBtn.onclick = () => location.reload();
        }
        document.getElementById("desc-msg").innerText = c.msg;
        document.getElementById("fact-msg").innerText = c.fact;
    }

    function nextLevel() {
        currentLevel++;
        if (currentLevel < levels.length) {
            initLevel();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById("game-card").innerHTML = `
            <h1 style='color:var(--success)'>🏆 幸存者领袖</h1>
            <p style='font-size:1.4em; text-align:center'>恭喜剩下的同学！你们不仅活过了1348年，还用智慧推动了欧洲社会的进步！</p>
            <div class='fact-box'>
                <strong>历史总结：</strong> 黑死病虽然是人类的灾难，但它客观上导致了欧洲劳动力的匮乏，使得农奴地位提高，庄园制瓦解，间接推动了欧洲向近代社会的转型。
            </div>
            <button class='nav-btn' onclick='location.reload()' style='width:100%'>重新开始教学</button>
        `;
    }

    window.onload = initLevel;
</script>

</body>
</html>
