name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias snaptext \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Snaptext, OU=Dev, O=ChewYenHan, L=Taiping, ST=Perak, C=MY"

      - name: Init TWA project from PWA manifest
        run: |
          mkdir -p twa
          bubblewrap init \
            --manifest="https://chewyenhan.github.io/my-ocr-app/manifest.json" \
            --directory="twa"

      - name: Configure signing
        run: |
          cd twa
          # Update twa-manifest.json to add signing key
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.signingKey = { path: '../release.keystore', alias: 'snaptext' };
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          "
          cat twa-manifest.json

      - name: Build APK
        working-directory: twa
        run: |
          bubblewrap build
        env:
          STORE_PASS: android123
          KEY_PASS: android123
          KEY_ALIAS: snaptext

      - name: Collect APK
        run: |
          mkdir -p output
          find . -name "*.apk" -exec cp {} output/ \; 2>/dev/null
          echo "=== Files in output ==="
          ls -la output/ 2>/dev/null || echo "No APK files found"
          echo "=== Searching for APK ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: snaptext-ocr-apk
          path: output/
          retention-days: 90
