<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>1789：法兰西生存指南 - 沉浸剧情版</title>
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

<div id="custom-toast"></div>

<div id="vol-ctrl">
    <div class="vol-item">📣 语音: <input type="range" id="vol-speech" min="0" max="1" step="0.1" value="0.8"></div>
    <div class="vol-item">🥁 鼓点: <input type="range" id="vol-drum" min="0" max="1" step="0.1" value="0.2"></div>
</div>

<div id="p-start" class="panel active" style="text-align: center; justify-content: center; background: #8b0000; border: none;">
    <h1 style="color: white; font-size: 5em;">1789：巴黎生存指南</h1>
    <h2 style="color: gold; font-size: 2.5em;">— 沉浸剧情·多分支版 —</h2>
    
    <div id="api-setup" style="margin: 20px auto; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; width: 80%; border: 2px solid gold;">
        <p style="color: gold; font-size: 1.5em; margin: 0 0 10px 0;">🔌 外接 API 设置 (沉浸式沟通体验必需)</p>
        <input type="password" id="api-key-input" class="group-input" style="font-size: 1.2em; width: 70%; padding: 10px; margin-bottom: 10px;" placeholder="在此输入 Gemini API Key">
        <br>
        <button class="sys-btn" style="font-size: 1.2em; padding: 10px 20px; width: auto; background: #444; border-color: gold;" onclick="detectModels()">🔍 检测并加载模型</button>
        <br>
        <select id="model-select" class="group-input" style="font-size: 1.2em; width: 70%; padding: 10px; margin-top: 10px; display: none; background: #fff; color: #000;"></select>
    </div>

    <button class="sys-btn" style="background: gold; color: #8b0000; font-size: 3em; height: 150px; margin-top: 20px;" onclick="initAll()">⚔️ 开启历史体验 ⚔️</button>
</div>

<div id="p-setup" class="panel">
    <h2>设定玩家数量</h2>
    <div style="text-align: center; margin-top: 50px;">
        <p style="font-size: 2em;">有多少位玩家准备参与历史轮回：</p>
        <input type="number" id="g-count" value="3" class="group-input"><br><br>
        <button class="sys-btn" onclick="goNaming()">下一步：输入名号</button>
    </div>
</div>

<div id="p-naming" class="panel">
    <h2>玩家名录</h2>
    <div id="name-container" style="flex-grow: 1; overflow-y: auto; padding: 20px;"></div>
    <button class="sys-btn" onclick="saveGroups()">进入大厅</button>
</div>

<div id="p-menu" class="panel">
    <h2>📜 巴黎大地图：历史的选择</h2>
    <div id="group-list" style="flex-grow: 1; overflow-y: auto;"></div>
    <p id="victory" style="display:none; text-align:center; color:red; font-size:2em;">🔥 全民觉醒！旧制度彻底崩塌！ 🔥</p>
</div>

<div id="p-game" class="panel">
    <div id="status-bar">
        <span id="show-gname">玩家</span>
        <span id="show-stat">状态：阶级压迫中</span>
    </div>

    <div id="scene-img-area" style="text-align: center; margin-bottom: 10px;"></div>

    <div id="story-text"></div>
    <div id="choice-area"></div>
    
    <div id="ai-area">
        <div class="back-hall-btn" onclick="runScene('MENU')">🚪 返回大厅</div>
        <div id="chat-box"></div>
        <div style="display: flex; margin-top: 10px;">
            <input type="text" id="ai-input" class="group-input" style="flex-grow: 1; margin: 0; font-size: 1.5em;" placeholder="质问国王..." onkeypress="handleEnter(event)">
            <button id="ai-send-btn" onclick="chatWithKing()" style="width: 150px; font-size: 1.8em; background: #000; color: #fff; cursor: pointer;">质问</button>
        </div>
        <button id="final-revolt" class="sys-btn" style="display:none; background: black; border-color: red; margin-top: 10px; padding: 15px;" onclick="runScene('REVOLT')">🔥 无法沟通，发动武装起义！</button>
    </div>
</div>

<audio id="bg-music" loop src="assets/bgm.mp3"></audio>
<audio id="drum-effect" src="assets/drum.mp3"></audio>

<script src="story.js?v=10"></script>
<script src="game.js?v=10"></script>
</body>
</html>
