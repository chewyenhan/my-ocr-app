<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马六甲王国：苏丹面试官 3.0 竞技版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-red: #7f1d1d;
            --royal-gold: #fbbf24;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #450a0a 0%, #7f1d1d 50%, #991b1b 100%);
            min-height: 100vh;
            color: #450a0a;
            overflow: hidden;
        }
        .historical-title { font-family: 'Ma Shan Zheng', cursive; }
        .global-text-size { font-size: 1.8rem; }
        .chat-container {
            height: calc(100vh - 420px);
            scrollbar-width: thin;
        }
        .message-bubble {
            max-width: 85%;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            padding: 20px 28px;
            line-height: 1.4;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            font-weight: bold;
        }
        .sultan-msg { background: var(--glass-bg); color: #450a0a; border-left: 10px solid var(--royal-gold); align-self: flex-start; }
        .student-msg { background: #1e40af; color: white; border-right: 10px solid #60a5fa; align-self: flex-end; }
        
        .screen-overlay {
            background: rgba(0, 0, 0, 0.95);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        .setup-screen {
            display: flex;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background-color: #450a0a;
            justify-content: center;
            align-items: center;
        }
        .team-btn.active {
            background-color: var(--royal-gold);
            color: var(--royal-red);
            transform: scale(1.1);
            border-color: white;
        }

        input[type=range], select {
            -webkit-appearance: none;
            background: #fecaca;
            height: 12px;
            border-radius: 6px;
        }
        select {
            height: auto;
            background: white;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #7f1d1d;
            cursor: pointer;
            border: 2px solid #fbbf24;
        }
    </style>
</head>
<body class="p-4">

    <!-- 1. 设置页面 -->
    <div id="setupScreen" class="setup-screen overflow-y-auto p-10">
        <div class="bg-white rounded-3xl p-10 max-w-4xl w-full shadow-2xl border-8 border-yellow-500">
            <h2 class="text-6xl font-black text-red-900 historical-title text-center mb-8">皇家面试初始化</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-2xl font-bold text-red-800 mb-2">API 密钥认证</label>
                    <div class="flex gap-4">
                        <input type="password" id="apiKeyInput" placeholder="在此粘贴您的 API KEY" class="flex-grow p-4 border-4 border-red-100 rounded-xl text-xl outline-none focus:border-red-800">
                        <button onclick="testKey()" id="checkBtn" class="bg-red-800 text-yellow-400 px-8 py-4 rounded-xl text-xl font-bold hover:bg-black transition">验证身份</button>
                    </div>
                </div>

                <!-- 新增：模型选择区域 -->
                <div id="modelSelectionArea" class="hidden animate-pulse">
                    <label class="block text-2xl font-bold text-red-800 mb-2">✨ 请点选适合的模型</label>
                    <select id="modelPicker" class="w-full p-4 border-4 border-green-200 rounded-xl text-xl font-bold outline-none focus:border-green-500">
                        <!-- 动态载入可用的模型 -->
                    </select>
                    <p class="text-sm text-green-700 mt-1 font-bold">已为您自动过滤可用模型列表</p>
                </div>

                <div class="grid grid-cols-2 gap-8">
                    <div class="bg-red-50 p-4 rounded-2xl border-2 border-red-100">
                        <label class="block text-2xl font-bold text-red-800 mb-4">🎵 背景音乐音量</label>
                        <input type="range" id="bgmVolume" min="0" max="1" step="0.05" value="0.3" class="w-full cursor-pointer" oninput="updateBgmVolume()">
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl border-2 border-red-100">
                        <label class="block text-2xl font-bold text-red-800 mb-4">👥 参赛战队数量</label>
                        <select id="teamCountSelect" onchange="generateTeamInputs()" class="w-full p-4 border-4 border-red-100 rounded-xl text-xl font-bold outline-none">
                            <option value="2">2 个战队</option>
                            <option value="3">3 个战队</option>
                            <option value="4" selected>4 个战队</option>
                            <option value="5">5 个战队</option>
                            <option value="6">6 个战队</option>
                        </select>
                    </div>
                </div>

                <div id="teamNameInputs" class="grid grid-cols-2 gap-4 max-h-48 overflow-y-auto p-2">
                    <!-- 动态生成战队输入框 -->
                </div>

                <button onclick="startGame()" id="startBtn" disabled class="w-full bg-gray-400 text-white py-6 rounded-2xl text-4xl font-black transition shadow-xl mt-4 opacity-50 cursor-not-allowed">
                    请先验证 API 密钥
                </button>
            </div>
        </div>
    </div>

    <!-- 2. 游戏主界面 -->
    <div class="max-w-7xl mx-auto">
        <!-- 战队选择器 -->
        <div id="teamSwitcher" class="flex gap-3 mb-4 overflow-x-auto pb-2">
            <!-- 动态生成战队切换按钮 -->
        </div>

        <header class="bg-white rounded-3xl shadow-2xl p-6 mb-4 border-b-8 border-yellow-500 flex justify-between items-center">
            <div>
                <h1 id="currentTeamDisplay" class="text-4xl font-black text-red-900 mb-1">加载中...</h1>
                <p class="text-xl text-red-700 font-bold">苏丹目札法沙 正在殿前考校...</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="bg-red-900 text-white px-6 py-2 rounded-2xl border-2 border-yellow-500 text-center">
                    <p class="text-sm font-bold opacity-80">生命值</p>
                    <div id="heartDisplay" class="text-3xl">❤️ ❤️ ❤️</div>
                </div>
                <div class="bg-yellow-500 text-red-900 px-6 py-2 rounded-2xl border-2 border-red-900 text-center">
                    <p class="text-sm font-bold opacity-80">当前得分</p>
                    <div id="scoreDisplay" class="text-3xl font-black">0</div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1">
                <div class="bg-white rounded-3xl p-6 shadow-xl border-4 border-red-900 flex flex-col items-center">
                    <div class="w-40 h-40 rounded-full bg-red-900 border-4 border-yellow-500 flex items-center justify-center overflow-hidden mb-4 relative">
                        <svg viewBox="0 0 100 100" class="w-32 h-32 mt-2">
                            <path d="M50 10 C30 10 20 30 20 50 C20 70 30 90 50 95 C70 90 80 70 80 50 C80 30 70 10 50 10" fill="#fbbf24"/>
                            <path d="M50 15 C35 15 25 30 25 50 C25 65 30 80 50 85 C70 80 75 65 75 50 C75 30 65 15 50 15" fill="#450a0a"/>
                            <circle cx="40" cy="45" r="3" fill="white"/><circle cx="60" cy="45" r="3" fill="white"/>
                            <path d="M40 70 Q50 80 60 70" stroke="white" stroke-width="2" fill="none"/>
                        </svg>
                    </div>
                    <div class="bg-yellow-500 text-red-900 px-4 py-1 rounded-full font-black text-xl mb-4">苏丹目札法沙</div>
                    <div class="w-full space-y-3">
                        <div class="bg-red-50 p-3 rounded-xl border-2 border-red-100">
                            <p class="text-sm font-black text-red-800 border-b border-red-200 mb-1">📜 考校重点</p>
                            <p class="text-lg font-bold">1. 敦吡叻的贡献<br>2. 马六甲货币系统<br>3. 郑和与大明关系<br>4. 伊斯兰传播中心</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col bg-white/20 backdrop-blur-md rounded-3xl shadow-2xl border-4 border-yellow-500 overflow-hidden relative">
                <div id="chatBox" class="chat-container p-8 overflow-y-auto flex flex-col global-text-size">
                    <!-- 聊天内容动态生成 -->
                </div>
                
                <div class="p-6 bg-white border-t-4 border-yellow-500 flex gap-3 items-center">
                    <input type="text" id="userInput" placeholder="恭敬地奏报..." class="flex-grow p-4 border-2 border-red-100 rounded-xl text-2xl focus:border-yellow-500 outline-none font-bold">
                    <button onclick="handleSend()" class="bg-red-800 text-yellow-400 px-8 py-4 rounded-xl text-2xl font-black hover:bg-black transition shadow-xl">奏报</button>
                    <button onclick="showSummary()" class="bg-yellow-600 text-white px-4 py-4 rounded-xl text-xl font-bold hover:bg-black transition">总结成绩</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 遮罩层 -->
    <div id="successOverlay" class="screen-overlay" style="color: #fbbf24;">
        <h2 class="text-9xl mb-6">🏆</h2>
        <h3 id="winTeamName" class="text-7xl font-black mb-4">战队名称</h3>
        <p class="text-4xl mb-8">面试成功！册封为马六甲首席港务官！<br>(总分 +3)</p>
        <button onclick="hideOverlays()" class="bg-yellow-500 text-red-900 px-12 py-4 rounded-xl text-3xl font-black">返回大殿</button>
    </div>

    <div id="failOverlay" class="screen-overlay" style="color: #ef4444;">
        <h2 class="text-9xl mb-6">💢</h2>
        <h3 id="failTeamName" class="text-7xl font-black mb-4">战队名称</h3>
        <p class="text-4xl mb-8">面试失败！苏丹大怒，将其逐出大殿！</p>
        <button onclick="hideOverlays()" class="bg-red-600 text-white px-12 py-4 rounded-xl text-3xl font-black">返回大殿</button>
    </div>

    <!-- 4. 总结页面 -->
    <div id="summaryScreen" class="screen-overlay" style="background: white; color: #450a0a; display: none;">
        <h2 class="text-7xl font-black text-red-900 historical-title mb-10">🕌 皇家面试最终榜单</h2>
        <div id="rankList" class="w-full max-w-4xl space-y-4 mb-10">
            <!-- 动态生成排名 -->
        </div>
        <button onclick="document.getElementById('summaryScreen').style.display='none'" class="bg-red-800 text-yellow-400 px-12 py-5 rounded-xl text-3xl font-black">继续考校</button>
    </div>

    <!-- 5. 音频组件 -->
    <audio id="bgmAudio" loop preload="auto"></audio>

    <script>
        let apiKey = "";
        let selectedModel = ""; // 改为动态选择
        let teams = {};
        let activeTeamId = "";
        
        // 稳定的备用 BGM URL
        const BGM_URL = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSystemSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start();
                osc.stop(now + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start();
                osc.stop(now + 0.3);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.5);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start();
                osc.stop(now + 0.5);
            }
        }

        const SULTAN_TOPICS = [
            "谈谈本王的首相敦吡叻，他为何被誉为伟大的领袖？",
            "本王制定的锡币制度，对马六甲的贸易有何意义？",
            "大明的郑和船队多次到访，你认为本王为何要与大明交好？",
            "为何马六甲被称为‘伊斯兰传播中心’？",
            "若商人们在马六甲港口发生纠纷，他们应该使用哪种语言沟通？",
            "本王如何利用马六甲的地理位置来发展贸易？"
        ];

        const systemPrompt = `你现在是15世纪马六甲王国的苏丹目札法沙。
        规则：
        1. 语气极其威严、自豪、有皇家风范。
        2. 考核点：敦吡叻(Tun Perak)、锡币(Tin Coin/Manun)、马来语、大明保护、伊斯兰教中心。
        3. 回答正确：赞赏并提出下一个随机历史问题（参考以上考点）。
        4. 回答错误或乱答：在回复开头明确加上“【错误】”二字。
        5. 每次回复保持简洁（80字内）。`;

        window.onload = generateTeamInputs;

        function updateBgmVolume() {
            const bgm = document.getElementById('bgmAudio');
            const val = document.getElementById('bgmVolume').value;
            bgm.volume = val;
        }

        function generateTeamInputs() {
            const count = document.getElementById('teamCountSelect').value;
            const container = document.getElementById('teamNameInputs');
            container.innerHTML = "";
            for(let i=1; i<=count; i++) {
                container.innerHTML += `
                    <input type="text" placeholder="战队 ${i} 名称" value="战队 ${i}" class="team-input p-3 border-2 border-red-50 rounded-lg text-lg font-bold outline-none focus:border-red-400">
                `;
            }
        }

        async function testKey() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playSystemSfx('click');

            const key = document.getElementById('apiKeyInput').value.trim();
            if(!key) return alert("请输入 API Key");
            const btn = document.getElementById('checkBtn');
            btn.innerText = "验证中...";
            
            // 尝试预热背景音乐
            const bgm = document.getElementById('bgmAudio');
            bgm.src = BGM_URL;
            bgm.load();

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await resp.json();
                
                if(data.models) {
                    apiKey = key;
                    
                    // 过滤并填充模型选择列表
                    const picker = document.getElementById('modelPicker');
                    picker.innerHTML = "";
                    
                    // 只展示能生成内容且包含 gemini 的模型
                    const validModels = data.models.filter(m => 
                        m.supportedGenerationMethods.includes("generateContent") && 
                        m.name.toLowerCase().includes("gemini")
                    );

                    if (validModels.length === 0) {
                        alert("该 API Key 下没有可用的 Gemini 模型。");
                        return;
                    }

                    validModels.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.name;
                        // 简化显示名称，例如 models/gemini-pro -> gemini-pro
                        opt.innerText = m.displayName || m.name.split('/').pop();
                        picker.appendChild(opt);
                    });

                    // 显示模型选择区域
                    document.getElementById('modelSelectionArea').classList.remove('hidden');
                    
                    // 启用开始按钮
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').className = "w-full bg-green-600 text-white py-6 rounded-2xl text-4xl font-black transition shadow-xl mt-4 cursor-pointer";
                    document.getElementById('startBtn').innerText = "陛下，一切准备就绪";
                    
                    alert("验证成功！已载入可用模型列表。请在下方点选后进殿。");
                }
            } catch(e) { 
                alert("验证失败：Key 无效、网络受限或 API 额度已耗尽。"); 
                console.error(e);
            }
            finally { btn.innerText = "验证身份"; }
        }

        function startGame() {
            // 获取最终选定的模型
            selectedModel = document.getElementById('modelPicker').value;
            if(!selectedModel) return alert("请先选择一个模型");

            playSystemSfx('success');
            const bgm = document.getElementById('bgmAudio');
            bgm.volume = document.getElementById('bgmVolume').value;
            bgm.play().catch(e => console.log("BGM Play Error:", e));

            const inputs = document.querySelectorAll('.team-input');
            const switcher = document.getElementById('teamSwitcher');
            switcher.innerHTML = "";

            inputs.forEach((input, index) => {
                const id = `team_${index}`;
                const name = input.value || `战队 ${index + 1}`;
                teams[id] = {
                    name: name,
                    lives: 3,
                    score: 0,
                    correctCount: 0,
                    history: [{
                        role: "model",
                        parts: [{ text: `(威严) ${name}，本王的时间非常宝贵。若你三度让本王失望，便逐出宫门！\n\n问你：${SULTAN_TOPICS[Math.floor(Math.random()*SULTAN_TOPICS.length)]}` }]
                    }],
                    status: 'active'
                };
                
                const btn = document.createElement('button');
                btn.id = `btn_${id}`;
                btn.className = "team-btn min-w-[150px] p-4 bg-white/20 text-white border-2 border-white/30 rounded-xl font-bold text-xl transition flex-shrink-0";
                btn.innerText = name;
                btn.onclick = () => switchTeam(id);
                switcher.appendChild(btn);
            });

            document.getElementById('setupScreen').style.display = 'none';
            switchTeam('team_0');
        }

        function switchTeam(id) {
            playSystemSfx('click');
            activeTeamId = id;
            
            document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn_${id}`).classList.add('active');
            
            const team = teams[id];
            document.getElementById('currentTeamDisplay').innerText = `正在面试：${team.name}`;
            document.getElementById('scoreDisplay').innerText = team.score;
            updateHearts(team.lives);

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            team.history.forEach(msg => {
                appendMsg(msg.parts[0].text, msg.role === 'model' ? 'sultan-msg' : 'student-msg', false);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const bgm = document.getElementById('bgmAudio');
            if(bgm.paused) bgm.play().catch(()=>{});

            const team = teams[activeTeamId];
            if(team.status !== 'active') return;

            const text = document.getElementById('userInput').value.trim();
            if(!text || !apiKey) return;

            playSystemSfx('click');
            appendMsg(text, 'student-msg');
            document.getElementById('userInput').value = "";
            team.history.push({ role: "user", parts: [{ text: text }] });

            const loadingId = 'L-' + Date.now();
            appendMsg('苏丹沉思中...', 'sultan-msg', true, loadingId);

            try {
                // 使用在首页选定的选定模型名称
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: team.history,
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                
                if(data.error) throw new Error(data.error.message);

                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById(loadingId).innerText = aiText;
                team.history.push({ role: "model", parts: [{ text: aiText }] });

                if(aiText.includes("【错误】")) {
                    team.lives--;
                    playSystemSfx('fail');
                    updateHearts(team.lives);
                    if(team.lives <= 0) {
                        team.status = 'lost';
                        showOverlay('failOverlay', team.name);
                    }
                } else {
                    team.correctCount++;
                    if(team.correctCount >= 3) {
                        team.score += 3;
                        team.status = 'won';
                        showOverlay('successOverlay', team.name);
                        playSystemSfx('success');
                        document.getElementById('scoreDisplay').innerText = team.score;
                    }
                }

                if(team.status === 'active') await playAITTS(aiText);
            } catch (e) {
                document.getElementById(loadingId).innerText = `（苏丹离座）错误：${e.message || "连接异常"}`;
            }
        }

        async function playAITTS(text) {
            const cleanText = text.replace(/【错误】/g, "").trim();
            try {
                const ttsResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `请用威严、低沉、缓慢的古代帝王语气说出：${cleanText}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: { prebuiltVoiceConfig: { voiceName: "Charon" } }
                            }
                        }
                    })
                });
                const ttsData = await ttsResponse.json();
                const pcmData = ttsData.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if (pcmData) {
                    const audioBlob = pcmToWav(pcmData, 24000);
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                }
            } catch (err) {
                console.error("TTS API Error:", err);
            }
        }

        function pcmToWav(base64, sampleRate) {
            const buffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            const dataSize = buffer.byteLength;

            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + dataSize, true);
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, dataSize, true);

            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        }

        function showOverlay(id, teamName) {
            const overlay = document.getElementById(id);
            if(id === 'successOverlay') document.getElementById('winTeamName').innerText = teamName;
            else document.getElementById('failTeamName').innerText = teamName;
            overlay.style.display = 'flex';
        }

        function hideOverlays() {
            document.getElementById('successOverlay').style.display = 'none';
            document.getElementById('failOverlay').style.display = 'none';
        }

        function showSummary() {
            playSystemSfx('click');
            const rankList = document.getElementById('rankList');
            rankList.innerHTML = "";
            
            Object.values(teams).forEach(team => {
                const statusIcon = team.status === 'won' ? '👑' : (team.status === 'lost' ? '❌' : '⏳');
                rankList.innerHTML += `
                    <div class="flex justify-between items-center bg-red-50 p-6 rounded-2xl border-4 border-red-900">
                        <span class="text-4xl font-black">${team.name} ${statusIcon}</span>
                        <span class="text-4xl font-black text-red-800">${team.score} 分</span>
                    </div>
                `;
            });
            document.getElementById('summaryScreen').style.display = 'flex';
        }

        function updateHearts(l) {
            let h = ""; for(let i=0; i<3; i++) h += (i < l) ? "❤️ " : "🖤 ";
            document.getElementById('heartDisplay').innerText = h;
        }

        function appendMsg(c, cl, scroll=true, id=null) {
            const div = document.createElement('div');
            div.className = `message-bubble ${cl}`; if(id) div.id = id;
            div.innerText = c;
            const cb = document.getElementById('chatBox');
            cb.appendChild(div);
            if(scroll) cb.scrollTop = cb.scrollHeight;
        }
    </script>
</body>
